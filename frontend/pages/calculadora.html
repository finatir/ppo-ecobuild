<div class="logo">

<div class="container">

    <div class="card">

        <h1>Calculadora de Materiais</h1>

        <label>Projeto</label>

        <select id="projeto">
            <option>Carregando...</option>
        </select>

        <label>Área da Parede (m²)</label>

        <input
            type="number"
            id="area"
            placeholder="Ex: 25"
        >

        <label>Modelo do Tijolo</label>

        <select id="modelo" onchange="alterarModelo()">

            <option value="">
                Escolha
            </option>

            <option value="9x14x19">
                Tijolo 9 Furos
            </option>

            <option value="14x19x29">
                Bloco Concreto
            </option>

            <option value="custom">
                Personalizado
            </option>

        </select>

        <div id="custom"></div>

        <button onclick="calcular()">
            Calcular
        </button>

    </div>

    <div
        class="resultados"
        id="resultado"
>
</div>

</div>

<script src="../js/calculadora.js"></script>
<script src="../js/logout.js"></script>
</body>
</html>
