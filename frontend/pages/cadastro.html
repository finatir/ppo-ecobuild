<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro - EcoBuild</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="layout">

    <div class="sidebar">

        <div class="logo">
            EcoBuild
        </div>

        <a href="login.html">
            🔑 Login
        </a>

        <a href="cadastro.html">
            👤 Cadastro
        </a>

    </div>

    <div class="main">

        <div class="card">

            <h1>Criar Conta</h1>

            <br>

            <label>Nome Completo</label>

            <input
                type="text"
                id="nome"
                placeholder="Digite seu nome"
            >

            <label>Email</label>

            <input
                type="email"
                id="email"
                placeholder="Digite seu email"
            >

            <label>Senha</label>

            <input
                type="password"
                id="senha"
                placeholder="Digite sua senha"
            >

            <button onclick="cadastrar()">
                Cadastrar
            </button>

            <br><br>

            <p>
                Já possui conta?
                <a href="login.html">
                    Fazer Login
                </a>
            </p>

        </div>

    </div>

</div>

<script src="../js/cadastro.js"></script>

</body>
</html>
